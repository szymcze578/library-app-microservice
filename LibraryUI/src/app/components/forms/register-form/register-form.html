<div class="flex h-screen">
  <div class="w-1/2 flex items-center justify-center">
    <div class="flex flex-col max-w-101 gap-2.5">
        <div class="flex text-[32px]">
            Get Started Now
        </div>
        <div class="flex flex-col gap-1">
            <span> Name </span>
            <input class="border rounded-xs h-8 p-2"
            [placeholder]="'Name'"/>
        </div>
        <div class="flex flex-col gap-1">
            <span> Email address</span>
            <input class="border rounded-xs h-8 p-2"/>
        </div> 
        <div class="flex flex-col gap-1">
            <span> Password</span>
            <input class="border rounded-xs h-8 p-2"
            [type]="'password'"/>
         </div> 
    </div>
  </div>

  <div class="w-1/2 h-full rounded-l-[45px] overflow-hidden">
      <img 
        src="LibraryImage.jpg" 
        class="w-full h-full object-cover"
      />
    </div>
</div>
