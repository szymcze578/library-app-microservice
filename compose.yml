version: '3.8'
services:
  library-db:
    image: postgres:17
    container_name: library-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: Project
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d inferius" ]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_HOST=library-db
      - DATABASE_PORT=5432
      - DATABASE_NAME=Project
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - SERVER_PORT=8080
    depends_on:
      - library-db

